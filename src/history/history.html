<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation History - TranslateGemma</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="history-header">
      <h1>Translation History</h1>
      <div class="header-stats">
        <span id="entry-count">0 entries</span>
      </div>
    </header>

    <!-- Search & Filters -->
    <div class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Search translations or URLs..."
          autocomplete="off"
        >
        <button id="search-btn" class="icon-btn">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </div>

      <div class="filter-actions">
        <button id="clear-search-btn" class="text-btn" style="display: none;">Clear Search</button>
        <button id="clear-all-btn" class="danger-btn">Clear All History</button>
      </div>
    </div>

    <!-- History List -->
    <div class="history-list-container">
      <div id="history-list" class="history-list">
        <!-- Virtual list will be rendered here -->
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <div class="empty-icon">&#128269;</div>
        <h3>No translations yet</h3>
        <p>Your translation history will appear here.</p>
      </div>

      <div id="no-results-state" class="empty-state" style="display: none;">
        <div class="empty-icon">&#128269;</div>
        <h3>No results found</h3>
        <p>Try adjusting your search terms.</p>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="loading-state" style="display: none;">
      <div class="spinner"></div>
      <p>Loading history...</p>
    </div>
  </div>

  <script src="history.js" type="module"></script>
</body>
</html>
